# Server Configuration (Render sets PORT automatically)
server.port=${PORT:8080}

# MongoDB Configuration
spring.data.mongodb.auto-index-creation=true
spring.config.import=optional:file:.env[.properties]
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/live-auction}

# CORS Configuration
# (Handled via CorsConfig.java for consistent preflight OPTIONS handling)

# Logging (INFO in production; override with LOGGING_LEVEL_COM_AUCTION=DEBUG locally)
logging.level.com.auction=${LOGGING_LEVEL_COM_AUCTION:INFO}

